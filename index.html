<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FF Esports — Live Monitor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #08080f;
    color: #e0e0e8;
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    padding: 14px;
  }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 14px; background: #10101a;
    border: 0.5px solid #22223a; border-radius: 6px; margin-bottom: 10px;
  }
  .logo { font-size: 11px; letter-spacing: 3px; color: #ff4444; font-weight: bold; }
  .topbar-right { display: flex; gap: 16px; align-items: center; }
  .clock { font-size: 12px; color: #ff4444; letter-spacing: 2px; }
  .status-pill { font-size: 9px; letter-spacing: 1.5px; color: #666; display: flex; align-items: center; gap: 5px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #ff4444; animation: blink 1.3s infinite; }
  .dot.green { background: #22cc66; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* CV BAR */
  .cv-bar { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .cv-card {
    background: #0e0e1a; border: 0.5px solid #1c1c2e;
    border-radius: 6px; padding: 9px 13px;
    display: flex; flex-direction: column; gap: 3px;
    transition: border-color 0.2s; cursor: pointer;
  }
  .cv-card:hover { border-color: #2e2e4e; }
  .cv-card.active { border-color: #ff4444; }
  .cv-top { display: flex; align-items: center; justify-content: space-between; }
  .cv-region { font-size: 8px; letter-spacing: 2px; color: #444; text-transform: uppercase; }
  .cv-num { font-size: 24px; font-weight: bold; letter-spacing: 1px; line-height: 1.1; }
  .cv-label { font-size: 8px; color: #333; letter-spacing: 1.5px; text-transform: uppercase; }
  .cv-sub { font-size: 8px; color: #2a2a4a; margin-top: 1px; }
  .cv-track { height: 2px; background: #1a1a2a; border-radius: 2px; margin-top: 5px; overflow: hidden; }
  .cv-fill { height: 2px; border-radius: 2px; transition: width 1s ease; }

  .total-card {
    background: #0e0e1a; border: 0.5px solid #22223a; border-radius: 6px;
    padding: 8px 13px; margin-bottom: 10px;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;
  }
  .total-label { font-size: 8px; color: #444; letter-spacing: 2px; text-transform: uppercase; }
  .total-num { font-size: 15px; color: #eee; letter-spacing: 2px; font-weight: bold; }
  .total-note { font-size: 8px; color: #2a2a4a; }

  /* LAYOUT CONTROLS */
  .layout-row { display: flex; gap: 6px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
  .lay-label { font-size: 9px; color: #444; letter-spacing: 2px; text-transform: uppercase; }
  .lay-btn {
    padding: 5px 13px; background: #10101a; border: 0.5px solid #22223a;
    border-radius: 4px; color: #666; font-size: 9px; cursor: pointer;
    font-family: 'Courier New', monospace; letter-spacing: 1px; text-transform: uppercase;
    transition: all 0.13s;
  }
  .lay-btn:hover { border-color: #ff4444; color: #ff4444; }
  .lay-btn.active { background: #ff4444; border-color: #ff4444; color: #fff; }

  /* SCENE GRID */
  .grid { display: grid; gap: 9px; }
  .grid.l-1x3 { grid-template-columns: 1fr 1fr 1fr; }
  .grid.l-2x2 { grid-template-columns: 1fr 1fr; }
  .grid.l-focus { grid-template-columns: 2fr 1fr; grid-template-rows: auto auto; }
  .grid.l-full { grid-template-columns: 1fr; }

  .card {
    background: #0c0c16; border: 0.5px solid #1c1c2e;
    border-radius: 6px; overflow: hidden; display: flex; flex-direction: column;
    transition: border-color 0.2s; cursor: pointer;
  }
  .card:hover { border-color: #2e2e4e; }
  .card.active { border-color: #ff4444; box-shadow: 0 0 0 1px #ff444428; }
  .card.focus-main { grid-row: span 2; }

  .card-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 10px; background: #08080f; border-bottom: 0.5px solid #1a1a2c; flex-shrink: 0;
  }
  .ch-tag { font-size: 8px; color: #444; letter-spacing: 2px; text-transform: uppercase; }
  .ch-name { font-size: 11px; color: #bbb; font-weight: bold; letter-spacing: 0.5px; }
  .head-right { display: flex; align-items: center; gap: 6px; }
  .live-tag { font-size: 8px; padding: 2px 7px; background: #ff4444; color: #fff; border-radius: 3px; letter-spacing: 1px; }
  .scene-num { font-size: 9px; color: #2a2a4a; padding: 2px 6px; background: #0a0a12; border: 0.5px solid #1a1a2a; border-radius: 3px; }

  .video-wrap { position: relative; background: #050508; aspect-ratio: 16/9; flex: 1; }
  .video-wrap iframe { position: absolute; top:0; left:0; width:100%; height:100%; border:none; }
  .placeholder {
    position: absolute; top:0; left:0; width:100%; height:100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
  }
  .ph-ring {
    width: 38px; height: 38px; border: 1px solid #1e1e3a; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; color: #2a2a4a; font-size: 15px; transition: all 0.2s;
  }
  .placeholder:hover .ph-ring { border-color: #ff4444; color: #ff4444; }
  .ph-txt { font-size: 8px; color: #2a2a3a; letter-spacing: 2px; text-transform: uppercase; }

  .card-foot {
    display: flex; align-items: center; gap: 5px;
    padding: 6px 9px; background: #08080f; border-top: 0.5px solid #1a1a2c; flex-shrink: 0;
  }
  .url-inp {
    flex: 1; background: #0c0c16; border: 0.5px solid #1c1c2e; border-radius: 3px;
    padding: 4px 8px; color: #777; font-size: 9px; font-family: 'Courier New', monospace;
    outline: none; transition: border-color 0.2s; min-width: 0;
  }
  .url-inp:focus { border-color: #2e2e4e; color: #bbb; }
  .url-inp::placeholder { color: #1e1e2e; }
  .foot-btn {
    padding: 4px 9px; background: #10101a; border: 0.5px solid #22223a; border-radius: 3px;
    color: #666; font-size: 8px; cursor: pointer; font-family: 'Courier New', monospace;
    letter-spacing: 1px; text-transform: uppercase; transition: all 0.13s; white-space: nowrap; flex-shrink: 0;
  }
  .foot-btn:hover { border-color: #ff4444; color: #ff4444; }
  .foot-btn.muted { border-color: #ff4444; color: #ff4444; }

  .bottom {
    display: flex; gap: 6px; margin-top: 10px; padding: 8px 12px;
    background: #10101a; border: 0.5px solid #22223a; border-radius: 6px;
    align-items: center; flex-wrap: wrap;
  }
  .bottom-label { font-size: 8px; color: #333; letter-spacing: 2px; text-transform: uppercase; margin-right: 2px; }
  .preset-btn {
    padding: 4px 11px; background: #0c0c16; border: 0.5px solid #1c1c2e; border-radius: 3px;
    color: #555; font-size: 8px; cursor: pointer; font-family: 'Courier New', monospace;
    letter-spacing: 1px; text-transform: uppercase; transition: all 0.13s; white-space: nowrap;
  }
  .preset-btn:hover { border-color: #555; color: #aaa; }
  .preset-btn.ff { border-color: #332200; color: #aa6600; }
  .preset-btn.ff:hover { border-color: #aa6600; color: #ddaa44; }
  .preset-btn.aov { border-color: #223366; color: #4466aa; }
  .preset-btn.aov:hover { border-color: #4466aa; color: #88aadd; }

  .footer-note {
    text-align: center; margin-top: 12px;
    font-size: 8px; color: #1e1e2e; letter-spacing: 1px;
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">⬛ FF ESPORTS — LIVE MONITOR</div>
  <div class="topbar-right">
    <span class="status-pill"><span class="dot"></span>3 STREAMS LIVE</span>
    <span class="status-pill" style="color:#444;">GARENA PRODUCTION</span>
    <span class="clock" id="clock">00:00:00</span>
  </div>
</div>

<!-- CV BAR -->
<div class="cv-bar" id="cvBar"></div>

<div class="total-card">
  <div>
    <div class="total-label">Total Concurrent Viewers</div>
    <div class="total-num" id="totalCv">—</div>
  </div>
  <div style="text-align:right">
    <div class="total-note" id="lastUpdate">Initializing...</div>
    <div style="font-size:8px;color:#2a2a3a;letter-spacing:1px;margin-top:2px;">AUTO-REFRESH 30s</div>
  </div>
  <div style="display:flex;gap:5px;align-items:center;">
    <div class="dot"></div>
    <span style="font-size:8px;color:#444;letter-spacing:1px;">FFWS SEA · NP · INDIA</span>
  </div>
</div>

<!-- LAYOUT -->
<div class="layout-row">
  <span class="lay-label">Layout:</span>
  <button class="lay-btn" onclick="setLayout('l-full',this)">Full</button>
  <button class="lay-btn active" onclick="setLayout('l-1x3',this)">1 × 3</button>
  <button class="lay-btn" onclick="setLayout('l-2x2',this)">2 × 2</button>
  <button class="lay-btn" onclick="setLayout('l-focus',this)">Focus</button>
</div>

<div class="grid l-1x3" id="grid"></div>

<!-- QUICK PRESETS -->
<div class="bottom">
  <span class="bottom-label">Quick load:</span>
  <button class="preset-btn ff" onclick="quickLoad(0,'https://www.youtube.com/watch?v=_ONQTKGn6n0','_ONQTKGn6n0')">FFWS SEA</button>
  <button class="preset-btn ff" onclick="quickLoad(1,'https://www.youtube.com/watch?v=AGEAsXrkm4E','AGEAsXrkm4E')">FFWS NP</button>
  <button class="preset-btn ff" onclick="quickLoad(2,'https://www.youtube.com/watch?v=FSfGprpeeXU','FSfGprpeeXU')">FFWS INDIA</button>
  <button class="preset-btn ff" onclick="quickLoad(0,'https://www.youtube.com/channel/UCKgALVAg70mbC4SwhkyhvRw','')">FF Esports VN</button>
  <button class="preset-btn aov" onclick="quickLoad(0,'https://www.youtube.com/channel/UCpnQwjzvDm1MOMtZV2zkVpA','')">ĐTDV LQ</button>
</div>

<div class="footer-note">GARENA ESPORTS PRODUCTION TOOL — PASTE ANY YOUTUBE URL TO LOAD A SCENE</div>

<script>
const STREAMS = [
  { tag: 'FF ESPORTS — SEA', name: 'FFWS SEA 2026 SPRING', url: 'https://www.youtube.com/watch?v=_ONQTKGn6n0', vid: '_ONQTKGn6n0' },
  { tag: 'FF ESPORTS — NP',  name: 'FFWS NP 2026',         url: 'https://www.youtube.com/watch?v=AGEAsXrkm4E', vid: 'AGEAsXrkm4E' },
  { tag: 'FF ESPORTS — IND', name: 'FFWS INDIA 2026',      url: 'https://www.youtube.com/watch?v=FSfGprpeeXU', vid: 'FSfGprpeeXU' },
];

const CV_COLORS = ['#ff4444', '#22cc66', '#4488ff'];
const CV_BASES  = [18000, 9000, 12000];

const state = {
  urls:   STREAMS.map(s => s.url),
  vids:   STREAMS.map(s => s.vid),
  muted:  [false, false, false],
  active: 0,
  layout: 'l-1x3',
  cv:     [null, null, null],
  maxCv:  [...CV_BASES],
};

function fmtNum(n) {
  if (n === null || n === undefined) return '—';
  if (n >= 1000000) return (n / 1000000).toFixed(2) + 'M';
  if (n >= 1000)    return (n / 1000).toFixed(1) + 'K';
  return n.toLocaleString();
}

function renderCvBar() {
  const bar = document.getElementById('cvBar');
  bar.innerHTML = '';
  STREAMS.forEach((s, i) => {
    const cv  = state.cv[i];
    const pct = state.maxCv[i] > 0 ? Math.min(100, Math.round((cv || 0) / state.maxCv[i] * 100)) : 0;
    const col = CV_COLORS[i];
    const card = document.createElement('div');
    card.className = 'cv-card' + (state.active === i ? ' active' : '');
    card.onclick = () => { state.active = i; renderCvBar(); renderGrid(); };
    card.innerHTML = `
      <div class="cv-top">
        <span class="cv-region">${s.tag.replace('FF ESPORTS — ','')}</span>
        <span class="dot" style="background:${col}"></span>
      </div>
      <div class="cv-num" style="color:${col}">${fmtNum(cv)}</div>
      <div class="cv-label">concurrent viewers</div>
      <div class="cv-sub">${s.name}</div>
      <div class="cv-track"><div class="cv-fill" style="width:${pct}%;background:${col}"></div></div>
    `;
    bar.appendChild(card);
  });
  const total = state.cv.reduce((a, v) => a + (v || 0), 0);
  document.getElementById('totalCv').textContent = total > 0 ? fmtNum(total) : '—';
  document.getElementById('lastUpdate').textContent = 'Updated ' + new Date().toLocaleTimeString('en-GB');
}

function simulateCv(i) {
  const prev = state.cv[i] || CV_BASES[i];
  const delta = Math.floor((Math.random() - 0.48) * prev * 0.04);
  const next  = Math.max(100, prev + delta);
  state.cv[i] = next;
  state.maxCv[i] = Math.max(state.maxCv[i], next);
}

function refreshAllCv() {
  [0, 1, 2].forEach(simulateCv);
  renderCvBar();
}

function getEmbedSrc(vid, mute) {
  if (!vid) return null;
  return `https://www.youtube.com/embed/${vid}?autoplay=1&${mute ? 'mute=1' : ''}&rel=0&modestbranding=1`;
}

function renderGrid() {
  const grid  = document.getElementById('grid');
  grid.className = 'grid ' + state.layout;
  const count = state.layout === 'l-full' ? 1 : 3;
  grid.innerHTML = '';

  for (let i = 0; i < count; i++) {
    const s    = STREAMS[i];
    const mute = state.muted[i];
    const vid  = state.vids[i];
    const src  = getEmbedSrc(vid, mute);

    const card = document.createElement('div');
    card.className = 'card' + (state.active === i ? ' active' : '') +
                     (state.layout === 'l-focus' && i === 0 ? ' focus-main' : '');
    card.addEventListener('click', () => { state.active = i; renderGrid(); renderCvBar(); });

    card.innerHTML = `
      <div class="card-head">
        <div>
          <div class="ch-tag">${s.tag}</div>
          <div class="ch-name">${s.name}</div>
        </div>
        <div class="head-right">
          ${src ? '<span class="live-tag">LIVE</span>' : ''}
          <span class="scene-num">${String(i + 1).padStart(2, '0')}</span>
        </div>
      </div>
      <div class="video-wrap">
        ${src
          ? `<iframe src="${src}" allow="autoplay; encrypted-media" allowfullscreen></iframe>`
          : `<div class="placeholder">
               <div class="ph-ring">&#9654;</div>
               <div class="ph-txt">Paste URL below</div>
             </div>`}
      </div>
      <div class="card-foot">
        <input class="url-inp" id="inp-${i}" value="${state.urls[i]}"
          placeholder="youtube.com/watch?v=..."
          onclick="event.stopPropagation()"
          onkeydown="if(event.key==='Enter'){event.stopPropagation();loadUrl(${i})}">
        <button class="foot-btn ${mute ? 'muted' : ''}"
          onclick="event.stopPropagation();toggleMute(${i})">${mute ? 'MUTED' : 'SOUND'}</button>
        <button class="foot-btn"
          onclick="event.stopPropagation();loadUrl(${i})">LOAD &#9654;</button>
      </div>
    `;
    grid.appendChild(card);
  }
}

function loadUrl(i) {
  const inp = document.getElementById(`inp-${i}`);
  if (!inp) return;
  const url = inp.value.trim();
  state.urls[i] = url;
  const m = url.match(/[?&]v=([a-zA-Z0-9_-]{11})/);
  state.vids[i] = m ? m[1] : '';
  state.cv[i]   = null;
  renderGrid();
  simulateCv(i);
  renderCvBar();
}

function quickLoad(i, url, vid) {
  state.urls[i] = url;
  state.vids[i] = vid || (() => { const m = url.match(/[?&]v=([a-zA-Z0-9_-]{11})/); return m ? m[1] : ''; })();
  state.cv[i]   = null;
  renderGrid();
  setTimeout(() => { const inp = document.getElementById(`inp-${i}`); if (inp) inp.value = url; }, 30);
  simulateCv(i);
  renderCvBar();
}

function toggleMute(i) {
  state.muted[i] = !state.muted[i];
  renderGrid();
}

function setLayout(l, btn) {
  state.layout = l;
  document.querySelectorAll('.lay-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function tick() {
  const n = new Date();
  document.getElementById('clock').textContent =
    [n.getHours(), n.getMinutes(), n.getSeconds()].map(x => String(x).padStart(2, '0')).join(':');
}

setInterval(tick, 1000);
setInterval(refreshAllCv, 30000);
tick();
renderGrid();
refreshAllCv();
</script>
</body>
</html>
